<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>

        <a class="link-cabecalho" href="https://www.google.com/intl/pt-BR/gmail/about/">
            Gmail
        </a>

        <a class="link-cabecalho" href="https://www.google.com/imghp?hl=pt-BR">
            Imagens
        </a>

        <div class="caixa-icone">
            <svg class="apps" focusable="false" viewBox="0 0 24 24">
                <path d="M6 8c1.1 0 2-.9 2-2S7.1 4 6 4 4 4.9 4 6s.9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM6 14c1.1 0 2-.9 2-2S7.1 10 6 10s-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM6 20c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"></path>
            </svg>
        </div>

        <a class="botao-login"
            href="https://accounts.google.com/">
            Fazer login
        </a>

    </header>

    <main>

        <img class="logo-google"
            src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/1280px-Google_2015_logo.svg.png"
            alt="Logo do Google">

        <div class="caixa-input">

            <svg class="icone-input" focusable="false" viewBox="0 0 24 24">
                <path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path>
            </svg>

            <input class="input-pesquisa" type="text">

            <div class="caixa-icones">

                <img class="icone-teclado"
                    src="https://www.gstatic.com/inputtools/images/tia.png"
                    alt="Ícone de teclado">

                <svg class="icone-colorido" viewBox="0 0 24 24">
                    <path fill="#4285f4"
                        d="M12 15c1.66 0 3-1.34 3-3V6a3 3 0 10-6 0v6c0 1.66 1.34 3 3 3z"></path>

                    <path fill="#34a853"
                        d="M11 18h2v3h-2z"></path>

                    <path fill="#ea4335"
                        d="M19 11h-1.7a5.3 5.3 0 01-10.6 0H5a7 7 0 0014 0z"></path>
                </svg>

                <svg class="icone-colorido" viewBox="0 0 24 24">
                    <circle fill="#4285f4" cx="10" cy="10" r="5"></circle>
                    <circle fill="#34a853" cx="17" cy="17" r="3"></circle>
                    <path fill="#fbbc04"
                        d="M14 14l5 5"></path>
                </svg>

            </div>

        </div>

        <div class="caixa-botoes">
            <button class="botao">Pesquisa Google</button>
            <button class="botao">Estou com sorte</button>
        </div>

    </main>

    <footer>

        <div class="caixa-rodape caixa-rodape--borda">
            <p>Brasil</p>
        </div>

        <div class="caixa-rodape">

            <div class="caixa-links">
                <a href="https://about.google/?utm_source=google-BR&utm_medium=referral&utm_campaign=hp-footer&fg=1">Sobre</a>
                <a href="https://www.google.com/intl/en_br/ads/?subid=ww-ww-et-g-awa-a-g_hpafoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpafooter&fg=1">Publicidade</a>
                <a href="https://www.google.com/services/?subid=ww-ww-et-g-awa-a-g_hpbfoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpbfooter&fg=1">Negócios</a>
                <a href="https://google.com/search/howsearchworks/?fg=1">Como funciona a Pesquisa</a>
            </div>

            <div class="caixa-links">
                <a href="https://policies.google.com/privacy?hl=en-BR&fg=1">Privacidade</a>
                <a href="https://policies.google.com/terms?hl=en-BR&fg=1">Termos</a>
                <p>Configurações</p>
            </div>

        </div>
    </footer>

</body>
</html>
